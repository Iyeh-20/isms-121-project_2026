<!DOCTYPE html>
<html lang="en">
    <head>
        <title>ISMS 121 Myform</title>
    </head>
    <body>
        <h1>Signup Form</h1>
        <section id="default">
            <h2>Please complete all the fields</h2>
            <fieldset>
                <form id="SignUp">
                    <label>Username:</label>
                    <input type="text" placeholder="What is your username?" name="username" id="username"><br><br><br>
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="Enter your password"><br><br>
                    <label>Gender:</label>
                    <input type="radio" id="male" checked name="gender" value="male">
                    <label for="male">Male:</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female:</label>
                    <label>Upload file</label><input type="file">
                    <br>
                    <button>Submit</button>
                </form>
            </fieldset>
        </section>
    </body>
